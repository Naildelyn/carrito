<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Criatura</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <div class="hero">
        <h1>Hola Criatura<br><span>te quiero</span></h1>
        <p>Este carrito es para usted, lo extraño</p>

        <div class="">
            <div class="car-wrapper">

                <svg class="car" viewBox="0 0 600 250" xmlns="http://www.w3.org/2000/svg">

          <!-- Sombra -->
          <ellipse cx="500" cy="240" rx="200" ry="12" fill="rgba(0,0,0,0.2)" class="shadow"/>

          <!-- Cuerpo bajo estilo Camaro -->
          <path d="M70 155 Q75 130 100 125 L500 125 Q525 130 530 155 L530 195 L70 195 Z" fill="#9DC1ED"/>

          <!-- Techo muy bajo y deportivo -->
          <path d="M140 125 Q155 85 185 72 Q240 58 310 56 Q370 56 410 70 Q440 82 455 125 Z" fill="#9DC1ED"/>

          <!-- Vidrio trasero inclinado -->
          <path d="M148 123 Q162 88 188 75 Q235 62 300 120 Z" fill="#B8D4D4" opacity="0.85"/>

          <!-- Vidrio delantero inclinado -->
          <path d="M308 120 Q340 62 400 68 Q432 76 448 123 Z" fill="#C1E6E6" opacity="0.85"/>

          <!-- Pilar B -->
          <rect x="300" y="60" width="10" height="63" rx="2" fill="#6F9FA6"/>

          <!-- Cofre largo y agresivo -->
          <path d="M455 125 Q490 118 525 128 L530 155 L455 155 Z" fill="#A3C7CF"/>
          
          <!-- Defensa delantera agresiva -->
          <path d="M525 138 Q555 140 560 158 L530 195 L520 195 Z" fill="#A3C7CF"/>

          <!-- Splitter delantero -->
          <rect x="530" y="188" width="35" height="6" rx="2" fill="#6E7575"/>

          <!-- Toma de aire delantera grande -->
          <rect x="533" y="158" width="25" height="18" rx="4" fill="#D6D2D2"/>
          <rect x="536" y="161" width="19" height="4" rx="1" fill="#233"/>
          <rect x="536" y="167" width="19" height="4" rx="1" fill="#233"/>
          <rect x="536" y="173" width="19" height="4" rx="1" fill="#D6D2D2"/>

          <!-- Faro delantero LED -->
          <path d="M528 130 Q550 132 555 144 L535 146 Q526 140 525 130 Z" fill="#D6D2D2"/>
          <line x1="530" y1="133" x2="548" y2="140" stroke="#FFF" stroke-width="1.5"/>

          <!-- Defensa trasera -->
          <path d="M70 138 Q48 142 42 160 L70 195 L80 195 Z" fill="#D6D2D2"/>

          <!-- Faro trasero -->
          <rect x="40" y="135" width="32" height="18" rx="3" fill="#FF3333" opacity="0.9"/>
          <rect x="43" y="138" width="26" height="5" rx="1" fill="#FF6666"/>
          <rect x="43" y="145" width="26" height="5" rx="1" fill="#CC2222"/>

          <!-- Spoiler trasero -->
          <path d="M70 138 Q48 142 42 160 L70 195 L80 195 Z" fill="#D6D2D2"/>
          <path d="M70 138 Q48 142 42 160 L70 195 L80 195 Z" fill="#D6D2D2"/>
   
          

          <!-- Línea character lateral -->
          <path d="M80 148 Q300 138 520 145" stroke="#6F9FA6" stroke-width="2.5" fill="none" opacity="0.7"/>


          <!-- RUEDA TRASERA -->
          <circle cx="165" cy="195" r="38" fill="#A6ADAD"/>
          <circle cx="165" cy="195" r="27" fill="#E3FAFA"/>
          <circle cx="165" cy="195" r="16" fill="#E3FAFA"/>

        
       

          <!-- RUEDA DELANTERA -->
          <circle cx="435" cy="195" r="38" fill="#A6ADAD"/>
          <circle cx="435" cy="195" r="27" fill="#E3FAFA"/>
          <circle cx="435" cy="195" r="16" fill="#E3FAFA"/>

      


</svg>
                </svg>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
